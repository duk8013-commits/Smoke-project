  #app { display: flex; height: 100vh; width: 100vw; }

  #globe-canvas { width: 100%; height: 100%; display: block; }

  #brand-mark {
    position: absolute; top: 24px; left: 32px;

    pointer-events: none;
  }
  #brand-mark .sep { color: #374151; margin: 0 8px; }
  #brand-mark .tagline { color: #6B7280; font-weight: 400; letter-spacing: 2.5px; }

  #hint {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    color: #4B5563; font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    pointer-events: none; transition: opacity 1.2s; opacity: 0.8;
  }
  #hint.hidden { opacity: 0; }

  #labels-layer {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
  }
  .label {
    position: absolute; color: #F3F4F6; font-size: 11px; font-weight: 600;
    pointer-events: none; white-space: nowrap;
    text-shadow: 0 0 6px rgba(0,0,0,0.95), 0 0 2px rgba(0,0,0,1);

    transition: opacity 0.4s;
    padding-left: 4px;

  .label-name { display: block; letter-spacing: 0.2px; }
  .label-detail {
    display: block; font-size: 9px; color: #9CA3AF;
    letter-spacing: 1.2px; text-transform: uppercase; font-weight: 500; margin-top: 1px;
  }

    border-left: 1px solid #161E2B;
    position: relative;

  #sidebar::-webkit-scrollbar-thumb { background: #1F2937; }

  #chapter-indicator {
    font-size: 10px; color: #B91C1C; letter-spacing: 3.5px;
    margin-bottom: 14px; font-weight: 700;

  .chapter-dot.active { background: #B91C1C; }

    padding: 18px 0; margin-bottom: 22px;
  }
  .stat-value {

    line-height: 1; letter-spacing: -0.8px;
  }
  .stat-value.accent { color: #B91C1C; }

    font-size: 10px; color: #94A3B8; letter-spacing: 1.8px;
    text-transform: uppercase; margin-top: 8px; line-height: 1.5;

  #chapter-body strong { color: #F3F4F6; font-weight: 600; }
  #chapter-body em { color: #FCA5A5; font-style: normal; font-weight: 600; }

  .location-detail { color: #94A3B8; font-size: 11.5px; margin-left: 4px; }

  }

</style>

    const theta = (lng + 180) * Math.PI / 180;
    return new THREE.Vector3(
      -radius * Math.sin(phi) * Math.cos(theta),

  // ARROWS — Draw ALL of these once at startup. Each is colored by destination tier.
  // Tobacco flows 1→2→3, money flows 3→4→5.
  const ALL_ARCS = [
    // 1→2: Leaf to factory (colored by destination: manufacturing gray)
    ['brazil','poland','manufacturing'],
    ['brazil','germany','manufacturing'],
    ['zimbabwe','germany','manufacturing'],

    ['poland','russia','consumer'],

    ['russia','london','brand'],

    ['egypt','geneva','brand'],
    ['bangladesh','london','brand'],
    ['mongolia','tokyo_b','brand'],
    ['mongolia','geneva','brand'],

    // 4→5: Brand profits to shareholders (colored by destination: investor purple)
    ['newyork','vanguard','investor'],

    ['geneva','vanguard','investor'],
    ['geneva','blackrock','investor'],
    ['beijing_b','cn_treasury','investor'],
  ];

  // ==========================================================================
  // THREE.JS SETUP
  // ==========================================================================
  const canvas = document.getElementById('globe-canvas');
  const globeContainer = document.getElementById('globe-container');

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0A0E17);

  const camera = new THREE.PerspectiveCamera(
    45, globeContainer.clientWidth / globeContainer.clientHeight, 0.1, 1000
  );
  camera.position.set(0, 0, 14);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setSize(globeContainer.clientWidth, globeContainer.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  // Pivot for rotation (so we can rotate WORLD without touching camera)
  const globePivot = new THREE.Group();
  scene.add(globePivot);

  // ===== GLOBE SPHERE =====
  const globeGeom = new THREE.SphereGeometry(GLOBE_RADIUS, 64, 64);
  const globeMat = new THREE.MeshPhongMaterial({
    color: 0x0F1A2B,
    emissive: 0x0A1220,
    specular: 0x222831,
    shininess: 10,
    transparent: true,
    opacity: 0.95,
  });
  const globe = new THREE.Mesh(globeGeom, globeMat);
  globePivot.add(globe);

  // ===== WIREFRAME GRID (lat/lng lines) =====
  const gridMat = new THREE.LineBasicMaterial({ color: 0x1E293B, transparent: true, opacity: 0.4 });

  // Latitude lines
  for (let lat = -60; lat <= 60; lat += 30) {
    const points = [];
    for (let lng = 0; lng <= 360; lng += 4) {
      points.push(latLngToVec3(lat, lng, GLOBE_RADIUS + 0.01));
    }
    const g = new THREE.BufferGeometry().setFromPoints(points);
    globePivot.add(new THREE.Line(g, gridMat));
  }
  // Longitude lines
  for (let lng = 0; lng < 360; lng += 30) {
    const points = [];
    for (let lat = -90; lat <= 90; lat += 4) {
      points.push(latLngToVec3(lat, lng, GLOBE_RADIUS + 0.01));
    }
    const g = new THREE.BufferGeometry().setFromPoints(points);
    globePivot.add(new THREE.Line(g, gridMat));
  }

  // ===== COUNTRY BORDERS (loaded from TopoJSON) =====
  const borderMat = new THREE.LineBasicMaterial({
    color: 0x3B556F, transparent: true, opacity: 0.85
  });

  function drawCountryBorders(geojson) {
    const R = GLOBE_RADIUS + 0.02;
    geojson.features.forEach(feature => {
      const geom = feature.geometry;
      if (!geom) return;
      const polygons = geom.type === 'Polygon' ? [geom.coordinates] : geom.coordinates;
      polygons.forEach(polygon => {
        polygon.forEach(ring => {
          const pts = [];
          ring.forEach(([lng, lat]) => pts.push(latLngToVec3(lat, lng, R)));
          // Subdivide long edges so the line follows the sphere curvature
          const smooth = [];
          for (let i = 0; i < pts.length - 1; i++) {
            const a = pts[i], b = pts[i + 1];
            smooth.push(a);
            const steps = Math.max(1, Math.floor(a.distanceTo(b) / 0.15));
            for (let s = 1; s < steps; s++) {
              const t = s / steps;
              const p = new THREE.Vector3().lerpVectors(a, b, t).setLength(R);
              smooth.push(p);
            }
          }
          smooth.push(pts[pts.length - 1]);
          const lineGeom = new THREE.BufferGeometry().setFromPoints(smooth);
          globePivot.add(new THREE.Line(lineGeom, borderMat));
        });
      });
    });
  }

  // Load countries (TopoJSON → GeoJSON). Small file (~100KB).
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    .then(r => r.json())
    .then(topo => {
      const geo = topojson.feature(topo, topo.objects.countries);
      drawCountryBorders(geo);
    })
    .catch(err => console.warn('Country borders failed to load:', err));

  // ===== ATMOSPHERIC GLOW =====
  const atmosphereGeom = new THREE.SphereGeometry(GLOBE_RADIUS * 1.08, 64, 64);
  const atmosphereMat = new THREE.ShaderMaterial({
    vertexShader: `
      varying vec3 vNormal;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      varying vec3 vNormal;
      void main() {
        float intensity = pow(0.55 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.2);
        gl_FragColor = vec4(0.72, 0.11, 0.11, 1.0) * intensity * 0.55;
      }
    `,
    blending: THREE.AdditiveBlending,
    side: THREE.BackSide,
    transparent: true,
  });
  scene.add(new THREE.Mesh(atmosphereGeom, atmosphereMat));

  // ===== LIGHTING =====
  scene.add(new THREE.AmbientLight(0x404858, 1.0));
  const dirLight = new THREE.DirectionalLight(0xFFE9D4, 0.8);
  dirLight.position.set(8, 5, 10);
  scene.add(dirLight);
  const rimLight = new THREE.DirectionalLight(0xB91C1C, 0.35);
  rimLight.position.set(-8, -3, -8);
  scene.add(rimLight);

  // ==========================================================================
  // MARKERS, ARCS, LABELS
  // ==========================================================================
  const markersGroup = new THREE.Group();
  const arcsGroup = new THREE.Group();
  globePivot.add(markersGroup);
  globePivot.add(arcsGroup);

  const labelsLayer = document.getElementById('labels-layer');
  const activeLabels = []; // { loc, el, worldPos }

  function colorForTier(tier) { return TIER_COLORS[tier] || TIER_COLORS.consumer; }

  function createMarker(loc) {
    const tier = loc.tier;
    const c = colorForTier(tier);
    const pos = latLngToVec3(loc.lat, loc.lng, GLOBE_RADIUS + 0.03);

    // Outer halo (bigger, softer)
    const haloGeom = new THREE.SphereGeometry(0.12, 16, 16);
    const haloMat = new THREE.MeshBasicMaterial({
      color: c.hex, transparent: true, opacity: 0.22
    });
    const halo = new THREE.Mesh(haloGeom, haloMat);
    halo.position.copy(pos);

    // Inner dot
    const dotGeom = new THREE.SphereGeometry(0.06, 12, 12);
    const dotMat = new THREE.MeshBasicMaterial({ color: c.hex, transparent: true });
    const dot = new THREE.Mesh(dotGeom, dotMat);
    dot.position.copy(pos);

    // Pulse ring lying flat on the surface
    const ringGeom = new THREE.RingGeometry(0.10, 0.14, 24);
    const ringMat = new THREE.MeshBasicMaterial({
      color: c.hex, transparent: true, opacity: 0.65, side: THREE.DoubleSide,
    });
    const ring = new THREE.Mesh(ringGeom, ringMat);
    ring.position.copy(pos);
    ring.lookAt(new THREE.Vector3(0,0,0));

    const group = new THREE.Group();
    group.add(halo); group.add(dot); group.add(ring);
    group.userData = { loc, tier, halo, dot, ring, phase: Math.random() * Math.PI * 2, isActive: true };
    return group;
  }

  // Create a curved ARROW between two surface points (static, with arrowhead at end)
  function createArrow(fromLoc, toLoc, color) {
    const a = latLngToVec3(fromLoc.lat, fromLoc.lng, GLOBE_RADIUS + 0.05);
    const b = latLngToVec3(toLoc.lat, toLoc.lng, GLOBE_RADIUS + 0.05);

    const distance = a.distanceTo(b);
    const mid = a.clone().add(b).multiplyScalar(0.5);
    const midLen = mid.length();
    mid.normalize();
    mid.multiplyScalar(midLen + distance * 0.45 + 0.3);

    const curve = new THREE.QuadraticBezierCurve3(a, mid, b);

    // Stop line a bit before endpoint so arrowhead has room
    const tipProgress = 0.96;
    const points = curve.getPoints(60).slice(0, Math.floor(60 * tipProgress) + 1);
    const lineGeom = new THREE.BufferGeometry().setFromPoints(points);
    const lineMat = new THREE.LineBasicMaterial({
      color, transparent: true, opacity: 0.85,
    });
    const line = new THREE.Line(lineGeom, lineMat);

    // Arrowhead (cone) at the endpoint, oriented along the tangent
    const tangentEnd = curve.getTangent(1.0).normalize();
    const headPos = curve.getPoint(tipProgress);
    const coneGeom = new THREE.ConeGeometry(0.08, 0.22, 10);
    const coneMat = new THREE.MeshBasicMaterial({ color });
    const cone = new THREE.Mesh(coneGeom, coneMat);
    cone.position.copy(headPos);
    // Cone's default axis is +Y; rotate to tangent direction
    cone.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), tangentEnd);

    const group = new THREE.Group();
    group.add(line);
    group.add(cone);
    group.userData = {
      line, cone, lineMat, coneMat,
      baseLineOpacity: 0.85, color
    };
    return group;
  }

  // ==========================================================================
  // DOM RENDERING (sidebar)
  // ==========================================================================
  const els = {
    indicator: document.getElementById('chapter-indicator'),
    title: document.getElementById('chapter-title'),
    subtitle: document.getElementById('chapter-subtitle'),
    body: document.getElementById('chapter-body'),
    stat: document.getElementById('stat-container'),
    locations: document.getElementById('locations-container'),
    dots: document.getElementById('chapter-dots'),
    prev: document.getElementById('prev-btn'),
    next: document.getElementById('next-btn'),
    hint: document.getElementById('hint'),
  };

  function buildDots() {
    els.dots.innerHTML = '';
    for (let i = 1; i < CHAPTERS.length; i++) {
      const d = document.createElement('div');
      d.className = 'chapter-dot';
      els.dots.appendChild(d);
    }
  }
  buildDots();

  function updateDots(current) {
    const dots = els.dots.querySelectorAll('.chapter-dot');
    dots.forEach((d, i) => {
      const chapterNum = i + 1; // dots represent chapters 1..5
      d.classList.remove('active', 'visited');
      if (chapterNum < current) d.classList.add('visited');
      else if (chapterNum === current) d.classList.add('active');
    });
  }

  // LocalStorage: save user edits so they persist across reloads
  const STORAGE_KEY = 'tobacco_globe_edits_v1';
  function loadEdits() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch { return {}; }
  }
  function saveEdit(chapterIdx, field, value) {
    const edits = loadEdits();
    if (!edits[chapterIdx]) edits[chapterIdx] = {};
    edits[chapterIdx][field] = value;
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(edits)); } catch {}
  }
  function getEdit(chapterIdx, field, fallback) {
    const edits = loadEdits();
    return edits[chapterIdx] && edits[chapterIdx][field] !== undefined
      ? edits[chapterIdx][field] : fallback;
  }

  function renderSidebar(ch, index) {
    els.indicator.textContent  = getEdit(index, 'indicator', ch.indicator);
    els.title.textContent      = getEdit(index, 'title', ch.title);
    els.subtitle.textContent   = getEdit(index, 'subtitle', ch.subtitle);
    els.body.innerHTML         = getEdit(index, 'body', ch.body);

    // Stat
    if (ch.stat) {
      const accentClass = index === 0 ? 'accent' : '';
      const statValue = getEdit(index, 'stat_value', ch.stat.value);
      const statLabel = getEdit(index, 'stat_label', ch.stat.label);
      els.stat.innerHTML = `
        <div class="stat-block">
          <div class="stat-value ${accentClass}" contenteditable="true" data-field="stat_value">${statValue}</div>
          <div class="stat-label" contenteditable="true" data-field="stat_label">${statLabel}</div>
        </div>`;
      // Attach save handlers to the new stat elements
      els.stat.querySelectorAll('[contenteditable]').forEach(el => {
        el.addEventListener('blur', () => {
          saveEdit(index, el.dataset.field, el.innerHTML.trim());
        });
      });
    } else {
      els.stat.innerHTML = '';
    }

    els.locations.innerHTML = '';

    els.prev.disabled = index === 0;
    if (index === 0) els.next.textContent = 'Эхлэх →';
    else if (index === CHAPTERS.length - 1) els.next.textContent = 'Дахин эхнээс ↺';
    else els.next.textContent = 'Дараагийн →';

    updateDots(index);
  }

  // Attach contenteditable save handlers to FIXED sidebar elements (once)
  ['indicator','title','subtitle','body'].forEach(field => {
    const el = els[field];
    el.setAttribute('contenteditable', 'true');
    el.addEventListener('blur', () => {
      saveEdit(currentChapter, field, field === 'body' ? el.innerHTML : el.textContent);
    });
  });

  // ==========================================================================
  // CHAPTER TRANSITIONS (globe is UNIFIED — only narration + highlight change)
  // ==========================================================================
  let currentChapter = 0;

  // Update marker/arc opacity based on active tier
  function highlightTier(activeTier) {
    markersGroup.children.forEach(m => {
      const d = m.userData;
      if (!d) return;
      const isActive = activeTier === null || d.tier === activeTier;
      // Halo + ring opacity; dot stays crisp
      if (d.halo) d.halo.material.opacity = isActive ? 0.30 : 0.10;
      if (d.dot)  d.dot.material.opacity  = isActive ? 1.0 : 0.55;
      d.isActive = isActive;
      // Pulse only on active; hide ring when inactive
      if (d.ring) d.ring.visible = isActive;
    });

    arcsGroup.children.forEach(arc => {
      const d = arc.userData;
      if (!d) return;
      const isActive = activeTier === null || d.destTier === activeTier;
      d.lineMat.opacity = isActive ? 0.85 : 0.12;
      d.coneMat.opacity = isActive ? 1.0 : 0.2;
      d.coneMat.transparent = true;
    });

    // Hide label for inactive markers (cleaner)
    activeLabels.forEach(lbl => {
      const isActive = activeTier === null || lbl.tier === activeTier;
      lbl.isActive = isActive;
    });
  }

  function setChapter(index) {
    currentChapter = index;
    const ch = CHAPTERS[index];
    highlightTier(ch.activeTier);
    autoOrientToChapter(index);
    renderSidebar(ch, index);
  }

  // Smoothly rotate globe toward an appropriate longitude for the active tier
  let targetRotationY = 0;
  let targetRotationX = 0;
  function autoOrientToChapter(index) {
    const ch = CHAPTERS[index];
    // For each tier, hand-pick a focal point to show relevant clusters
    const focalByTier = {
      farming:       { lat: 0,   lng: 20 },   // Africa + South America visible
      manufacturing: { lat: 35,  lng: 40 },   // Europe + Central Asia
      consumer:      { lat: 30,  lng: 80 },   // Asia (Mongolia, India, China)
      brand:         { lat: 40,  lng: 0 },    // Europe + North Atlantic
      investor:      { lat: 40,  lng: -40 },  // Atlantic — US east coast + UK
    };
    if (!ch.activeTier) { targetRotationY = 0; targetRotationX = 0; return; }
    const f = focalByTier[ch.activeTier];
    targetRotationY = -(f.lng) * Math.PI / 180 - Math.PI;
    targetRotationX = f.lat * Math.PI / 180 * 0.35;
  }

  // ==========================================================================
  // LABEL POSITIONING (project 3D → screen)
  // ==========================================================================
  const tmpVec = new THREE.Vector3();
  function updateLabels() {
    const w = globeContainer.clientWidth;
    const h = globeContainer.clientHeight;
    activeLabels.forEach(lbl => {
      // Hide labels for inactive tiers entirely (keeps scene readable)
      if (!lbl.isActive) { lbl.el.style.opacity = '0'; return; }

      tmpVec.copy(lbl.pos3d);
      // Apply globe rotation to the local position
      tmpVec.applyQuaternion(globePivot.quaternion);
      // World space projection
      tmpVec.project(camera);

      // Visibility: is the point facing the camera?
      const worldPos = lbl.pos3d.clone().applyQuaternion(globePivot.quaternion);
      const camToPoint = worldPos.clone().sub(camera.position);
      const camToCenter = new THREE.Vector3().sub(camera.position);
      const onNearSide = camToPoint.length() < camToCenter.length();

      if (tmpVec.z > 1 || !onNearSide) {
        lbl.el.style.opacity = '0';
        return;
      }

      const x = (tmpVec.x * 0.5 + 0.5) * w;
      const y = (-tmpVec.y * 0.5 + 0.5) * h;
      lbl.el.style.left = x + 'px';
      lbl.el.style.top = y + 'px';
      lbl.el.style.opacity = '1';
    });
  }

  // ==========================================================================
  // MOUSE / TOUCH ROTATION
  // ==========================================================================
  let isDragging = false;
  let lastX = 0, lastY = 0;
  let velocityY = 0, velocityX = 0;
  let autoRotateEnabled = true;

  function onPointerDown(e) {
    isDragging = true;
    autoRotateEnabled = false;
    const p = e.touches ? e.touches[0] : e;
    lastX = p.clientX; lastY = p.clientY;
    velocityY = 0; velocityX = 0;
    els.hint.classList.add('hidden');
  }
  function onPointerMove(e) {
    if (!isDragging) return;
    const p = e.touches ? e.touches[0] : e;
    const dx = p.clientX - lastX;
    const dy = p.clientY - lastY;
    lastX = p.clientX; lastY = p.clientY;
    velocityY = dx * 0.005;
    velocityX = dy * 0.005;
    targetRotationY += velocityY;
    targetRotationX += velocityX;
    targetRotationX = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, targetRotationX));
  }
  function onPointerUp() { isDragging = false; }

  globeContainer.addEventListener('mousedown', onPointerDown);
  window.addEventListener('mousemove', onPointerMove);
  window.addEventListener('mouseup', onPointerUp);
  globeContainer.addEventListener('touchstart', onPointerDown, { passive: true });
  window.addEventListener('touchmove', onPointerMove, { passive: true });
  window.addEventListener('touchend', onPointerUp);

  // ==========================================================================
  // ANIMATION LOOP
  // ==========================================================================
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    const t = clock.getElapsedTime();

    // Smooth rotation toward target
    if (autoRotateEnabled) {
      targetRotationY += 0.0008;
    }
    // Apply with damping for smoothness
    const currentY = globePivot.rotation.y;
    const currentX = globePivot.rotation.x;
    globePivot.rotation.y = currentY + (targetRotationY - currentY) * 0.06;
    globePivot.rotation.x = currentX + (targetRotationX - currentX) * 0.06;

    // Inertia decay (when not dragging)
    if (!isDragging) {
      velocityY *= 0.92;
      velocityX *= 0.92;
      if (Math.abs(velocityY) > 0.0005) targetRotationY += velocityY;
      if (Math.abs(velocityX) > 0.0005) targetRotationX += velocityX;
    }

    // Animate markers: pulse halos and rings — ONLY for active tier
    markersGroup.children.forEach(m => {
      const d = m.userData;
      if (!d || !d.isActive) return;
      d.phase += dt * 2.2;
      const pulse = 0.7 + 0.3 * Math.sin(d.phase);
      if (d.halo) {
        d.halo.scale.setScalar(0.8 + 0.5 * pulse);
        d.halo.material.opacity = 0.10 + 0.22 * pulse;
      }
      if (d.ring && d.ring.visible) {
        const ringPulse = (d.phase % 2) / 2; // 0..1
        d.ring.scale.setScalar(1 + ringPulse * 2.5);
        d.ring.material.opacity = 0.7 * (1 - ringPulse);
      }
    });

    // Arrows are static — no per-frame animation needed

    updateLabels();
    renderer.render(scene, camera);
  }

  // ==========================================================================
  // RESIZE HANDLING
  // ==========================================================================
  function onResize() {
    const w = globeContainer.clientWidth;
    const h = globeContainer.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  }
  window.addEventListener('resize', onResize);

  // ==========================================================================
  // BUTTON HANDLERS
  // ==========================================================================
  els.next.addEventListener('click', () => {
    if (currentChapter >= CHAPTERS.length - 1) {
      setChapter(0);
    } else {
      setChapter(currentChapter + 1);
    }
  });
  els.prev.addEventListener('click', () => {
    if (currentChapter > 0) setChapter(currentChapter - 1);
  });

  // Reset button — clears all edits
  document.getElementById('reset-edits').addEventListener('click', () => {
    if (confirm('Та бүх текст засварыг цэвэрлэхдээ итгэлтэй байна уу?')) {
      try { localStorage.removeItem(STORAGE_KEY); } catch {}
      setChapter(currentChapter);
    }
  });

  // ==========================================================================
  // KICKOFF
  // ==========================================================================
  // Build ALL markers, arrows, and labels ONCE (globe is unified now)
  LOCATIONS.forEach(loc => {
    const marker = createMarker(loc);
    markersGroup.add(marker);

    const labelEl = document.createElement('div');
    labelEl.className = 'label';
    labelEl.innerHTML = `<span class="label-name">${loc.name}</span><span class="label-detail">${loc.detail}</span>`;
    labelsLayer.appendChild(labelEl);
    activeLabels.push({
      el: labelEl,
      tier: loc.tier,
      pos3d: latLngToVec3(loc.lat, loc.lng, GLOBE_RADIUS + 0.1),
      isActive: true,
    });
  });

  ALL_ARCS.forEach(([fromId, toId, destTier]) => {
    const from = LOC_MAP[fromId], to = LOC_MAP[toId];
    if (!from || !to) return;
    const arrow = createArrow(from, to, colorForTier(destTier).hex);
    arrow.userData.destTier = destTier;
    arcsGroup.add(arrow);
  });

  setChapter(0);
  animate();
  // Hide hint after a few seconds
  setTimeout(() => { els.hint.classList.add('hidden'); }, 7000);
  </script>
</body>
</html>
